name: Build APK
on: [push, workflow_dispatch]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      - name: Build
        run: |
          mkdir -p /tmp/artea/www
          INDEX=$(find . -name "index.html" -not -path "./.git/*" | head -1)
          cp "$INDEX" /tmp/artea/www/index.html
          WEBDIR=$(dirname "$INDEX")
          cp -r "$WEBDIR"/. /tmp/artea/www/ 2>/dev/null || true
          cd /tmp/artea
          echo '{"name":"artea-gallery","version":"1.0.0","dependencies":{"@capacitor/android":"5.7.0","@capacitor/core":"5.7.0"},"devDependencies":{"@capacitor/cli":"5.7.0"}}' > package.json
          echo '{"appId":"com.arteagallery.app","appName":"Artea Gallery","webDir":"www","server":{"androidScheme":"https"}}' > capacitor.config.json
          npm install
          npx cap add android
          npx cap sync android
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon
      - uses: actions/upload-artifact@v4
        with:
          name: Artea-Gallery-APK
          path: /tmp/artea/android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
