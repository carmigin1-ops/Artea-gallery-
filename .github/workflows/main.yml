 name: Build APK
on: [push, workflow_dispatch]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      - run: |
          find . -not -path './.git/*' | sort
          mkdir -p /tmp/artea/www
          INDEX=$(find . -name "index.html" -not -path "./.git/*" | head -1)
          echo "Found index.html at: $INDEX"
          cp "$INDEX" /tmp/artea/www/index.html
          WEBDIR=$(dirname "$INDEX")
          cp -r "$WEBDIR"/. /tmp/artea/www/ 2>/dev/null || true
          ls -la /tmp/artea/www/
          cat > /tmp/artea/package.json << PKGJSON
          {"name":"artea-gallery","version":"1.0.0","dependencies":{"@capacitor/android":"5.7.0","@capacitor/core":"5.7.0"},"devDependencies":{"@capacitor/cli":"5.7.0"}}
          PKGJSON
          cat > /tmp/artea/capacitor.config.json << CAPJSON
          {"appId":"com.arteagallery.app","appName":"Artea Gallery","webDir":"www","server":{"androidScheme":"https"}}
          CAPJSON
          cd /tmp/artea
          npm install
          npx cap add android
          npx cap sync android
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon
          ls -lh app/build/outputs/apk/debug/
      - uses: actions/upload-artifact@v4
        with:
          name: Artea-Gallery-APK
          path: /tmp/artea/android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
